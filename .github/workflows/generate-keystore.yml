name: Generate Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias mykey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Pamoja, O=Android, C=US" \
            -storepass mypassword123 \
            -keypass mypassword123

      - name: Convert to Base64
        run: base64 -w 0 release.keystore > keystore_base64.txt

      - name: Upload Keystore Base64
        uses: actions/upload-artifact@v4
        with:
          name: keystore-base64
          path: keystore_base64.txt

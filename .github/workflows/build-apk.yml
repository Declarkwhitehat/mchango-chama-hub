- name: Add signing config to build.gradle
        env:
          KS_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          K_ALIAS: ${{ secrets.KEY_ALIAS }}
          K_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat >> android/app/build.gradle << EOF

          android {
              signingConfigs {
                  release {
                      storeFile file("release.keystore")
                      storePassword "${KS_PASSWORD}"
                      keyAlias "${K_ALIAS}"
                      keyPassword "${K_PASSWORD}"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
          }
          EOF

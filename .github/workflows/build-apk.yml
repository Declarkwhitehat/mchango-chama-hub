name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Remove existing Android folder
        run: rm -rf android

      - name: Add Android Platform
        run: npx cap add android

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json
          else
            echo "No google-services.json secret found, skipping"
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Add extra Android permissions
        run: |
          # Add biometric + notification permissions if not already present
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "USE_BIOMETRIC" "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.USE_BIOMETRIC"/>\n    <uses-permission android:name="android.permission.USE_FINGERPRINT"/>\n</manifest>|' "$MANIFEST"
          fi
          if ! grep -q "POST_NOTIFICATIONS" "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n</manifest>|' "$MANIFEST"
          fi

      - name: Grant Gradle Permission
        run: chmod +x android/gradlew

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Deploy Live Update
        run: |
          npm install @capacitor/live-updates
          npx cap live-updates deploy
        env:
          CAPACITOR_LIVE_UPDATES_APP_ID: ${{ secrets.CAPACITOR_LIVE_UPDATES_APP_ID }}
          CAPACITOR_LIVE_UPDATES_CHANNEL: ${{ secrets.CAPACITOR_LIVE_UPDATES_CHANNEL }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create or update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Pamoja App (Latest)
          body: |
            Latest build of Pamoja App.
            Download the APK below and install on your Android device.
          files: android/app/build/outputs/apk/debug/app-debug.apk
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    <!-- Force clear stale PWA caches on version update -->
    <script>
      (function() {
        var cacheVersion = 'v5-20260309-branding-fix';
        var storedVersion = localStorage.getItem('cache-version');
        
        if (storedVersion !== cacheVersion) {
          if ('caches' in window) {
            caches.keys().then(function(names) {
              names.forEach(function(name) { caches.delete(name); });
            });
          }
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(reg) { reg.unregister(); });
            }).then(function() {
              localStorage.setItem('cache-version', cacheVersion);
              if (storedVersion) window.location.reload();
            });
          } else {
            localStorage.setItem('cache-version', cacheVersion);
            if (storedVersion) window.location.reload();
          }
        }
      })();
    </script>
    
    <!-- Critical: Prevent theme flash by applying theme BEFORE any paint -->
    <script>
      (function() {
        var d = document.documentElement;
        var theme = null;
        
        try {
          theme = localStorage.getItem('theme');
        } catch (e) {}
        
        var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        // Determine if dark mode should be applied
        // Default to dark if no preference is saved
        var isDark = theme === 'dark' || 
                     theme === null || 
                     (theme === 'system' && systemDark);
        
        // Apply theme class synchronously before first paint
        if (isDark) {
          d.classList.add('dark');
          d.style.colorScheme = 'dark';
        } else {
          d.classList.remove('dark');
          d.style.colorScheme = 'light';
        }
        
        // Block transitions during initial load
        d.classList.add('no-transitions');
      })();
    </script>
    
    <!-- Critical CSS to prevent flash - inline dark theme background -->
    <style>

      html:not(.dark) { background-color: #ffffff; }
      .no-transitions, .no-transitions * { transition: none !important; }

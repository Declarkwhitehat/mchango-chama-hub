    <!-- Clean up any leftover service workers -->
    <script>
      (function() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(reg) { reg.unregister(); });
          });
        }
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(name) { caches.delete(name); });
          });
        }
      })();
    </script>

    <!-- Prevent theme flash -->
    <script>
      (function() {
        var d = document.documentElement;
        var theme = null;
        try { theme = localStorage.getItem('theme'); } catch (e) {}
        var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = theme === 'dark' || theme === null || (theme === 'system' && systemDark);
        if (isDark) { d.classList.add('dark'); d.style.colorScheme = 'dark'; }
        else { d.classList.remove('dark'); d.style.colorScheme = 'light'; }
        d.classList.add('no-transitions');
      })();
    </script>
    
    <style>

    <!-- One-time cleanup of any legacy service workers from the old PWA.
         Runs only once per device; skipping on subsequent loads keeps
         webview HTTP cache intact for fast native cold-starts on low networks. -->
    <script>
      (function() {
        try {
          if (localStorage.getItem('__sw_cleanup_done_v2') === '1') return;
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(reg) { reg.unregister(); });
            }).catch(function() {});
          }
          localStorage.setItem('__sw_cleanup_done_v2', '1');
        } catch (e) {}
      })();
    </script>


    <!-- Prevent theme flash -->
    <script>
      (function() {
        var d = document.documentElement;
        var theme = null;
        try { theme = localStorage.getItem('theme'); } catch (e) {}
        var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = theme === 'dark' || theme === null || (theme === 'system' && systemDark);
        if (isDark) { d.classList.add('dark'); d.style.colorScheme = 'dark'; }
        else { d.classList.remove('dark'); d.style.colorScheme = 'light'; }
        d.classList.add('no-transitions');
      })();
    </script>

    <!-- Canonical domain redirect: pamojanova.online -> www.pamojanova.com (preserves path, query, hash) -->
    <script>
      (function() {
        try {
          var h = window.location.hostname;
          if (h === 'pamojanova.online' || h === 'www.pamojanova.online') {
            window.location.replace('https://www.pamojanova.com' + window.location.pathname + window.location.search + window.location.hash);
          }
        } catch (e) {}
      })();
    </script>
